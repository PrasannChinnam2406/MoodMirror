# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/moodmirror?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Password_Of_Yours
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=moodmirror-super-secret-key-change-this-in-production-2024
jwt.expiration=86400000

# Gemini API
gemini.api.key=Your_API_Key
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Last.fm API (replaces Spotify - 100% free)
lastfm.api.key=Your_Key

# CORS
spring.web.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.moodmirror=INFO
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR
